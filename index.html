<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Screen Glass Button</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* FULL SCREEN INTERACTIVE GLASS BUTTON */
    .glass-btn-fullscreen {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      
      /* Reset default button appearance */
      appearance: none;
      -webkit-appearance: none;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      display: block;

      /* Rounded corners */
      border-radius: 24px;

      /* Liquid Glass Fill */
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);

      /* Specular highlights & depth */
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.35),
        0 8px 24px rgba(0, 0, 0, 0.2);

      /* Micro-interactions for tactile feedback */
      transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* ACTIVE / TAP STATE */
    .glass-btn-fullscreen:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.5),
        0 4px 12px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>

  <button class="glass-btn-fullscreen" type="button"></button>

</body>
</html>
