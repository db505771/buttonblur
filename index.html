<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Full Screen Interactive Glass</title>
  <style>
    /* Force page to reset margins and fill 100% of WebView */
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background: transparent !important;
      overflow: hidden;
    }

    /* FULL SCREEN GLASS BUTTON */
    .glass-btn-full {
      /* Force element to take full webview bounds */
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;

      /* Reset native button styles */
      appearance: none;
      -webkit-appearance: none;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      display: block;
      cursor: pointer;

      /* Optional corner rounding - change or remove to 0 if edge-to-edge */
      border-radius: 999px; 

      /* Liquid Glass Fill */
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);

      /* Specular rim highlight & inner glow */
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3);

      /* Touch Feedback */
      transition: background 0.15s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* TAP STATE */
    .glass-btn-full:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.22);
    }
  </style>
</head>
<body>

  <button class="glass-btn-full" type="button"></button>

</body>
</html>
