<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Button</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* GLASS BUTTON STYLING */
    .glass-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;

      /* Button shape */
      border-radius: 999px; /* Pill shape (change to 12px for squircle) */
      border: 1px solid rgba(255, 255, 255, 0.25);
      outline: none;
      cursor: pointer;

      /* Liquid Glass Fill */
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);

      /* Depth & Specular Reflection */
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.35),
        0 4px 12px rgba(0, 0, 0, 0.15);

      /* Smooth interaction transitions */
      transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
      -webkit-tap-highlight-color: transparent;
    }

    /* HOVER STATE (Desktop) */
    .glass-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.5),
        0 6px 16px rgba(0, 0, 0, 0.2);
    }

    /* TAP / CLICK STATE (Mobile & Desktop) */
    .glass-btn:active {
      transform: scale(0.95); /* Scales down slightly like iOS native buttons */
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.2),
        0 2px 6px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>

  <button class="glass-btn">
    <span>Filter</span>
  </button>

</body>
</html>
